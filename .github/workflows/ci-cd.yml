name: zihan-car CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: zihan-car-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-ros-bridge:
    name: Validate ROS bridge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Check Python syntax
        run: python -m py_compile tcp_ros_bridge.py

  build-harmony-app:
    name: Build HarmonyOS app
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up HarmonyOS SDK
        uses: god-dos/actions-setup-harmonyos-sdk@v1
        with:
          sdk-version: '4.1.0.400'
      - name: Build HAP
        run: |
          chmod +x hvigorw
          ./hvigorw clean assembleApp
      - name: Upload HAP
        uses: actions/upload-artifact@v4
        with:
          name: harmonyos-app
          path: entry/build/*/outputs/default/*.hap
          if-no-files-found: error

  deploy-car:
    name: Deploy ROS bridge to car
    needs: [validate-ros-bridge, build-harmony-app]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: [self-hosted, linux, car]
    environment: car-production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Deploy and restart ROS bridge
        run: ./scripts/deploy-car.sh
