name: zihan-car CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: zihan-car-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-ros-bridge:
    name: Validate ROS bridge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Check Python syntax
        run: python -m py_compile tcp_ros_bridge.py

  validate-harmony-app:
    name: Validate HarmonyOS project
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Check project metadata and Hvigor wrapper
        run: |
          test -f entry/oh-package.json5
          node --check hvigor/hvigor-wrapper.js

  deploy-car:
    name: Deploy ROS bridge to car
    needs: [validate-ros-bridge, validate-harmony-app]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: [self-hosted, linux, car]
    environment: car-production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Deploy and restart ROS bridge
        run: bash scripts/deploy-car.sh
